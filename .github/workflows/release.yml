name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 👈 添加这一行，允许手动触发
    inputs:
      release_version:
        description: '手动发布的版本号 (例如 v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Verify rustup and WASM target
        run: |
          rustup --version
          rustup target list --installed | grep wasm32-unknown-unknown
      - name: Install cargo-leptos
        run: cargo install --locked cargo-leptos
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build CSS & Frontend
        run: |
          cargo leptos build --release
          mv target/site/assets/tinydis.wasm  target/site/assets/tinydis_bg.wasm
          rm -rf ./target/site/assets/*.ts
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: target/site/assets

  build-backend:
    needs: [build-frontend]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: tinydis
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: tinydis.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Download Frontend Assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: temp_assets
      - name: Build Backend
        run:
          cargo build --package=tinydis --bin=tinydis --no-default-features --features=ssr --release --target ${{ matrix.target }}
      - name: Prepare Package
        shell: bash
        run: |
          mkdir -p staging/assets
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} staging/
          ls -R temp_assets
          cp -r temp_assets/* staging/assets/

      - name: Archive Release (Linux)
        if: runner.os == 'Linux'
        run: tar -czf tinydis-${{ matrix.target }}.tar.gz -C staging .
      - name: Archive Release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path staging/* -DestinationPath tinydis-${{ matrix.target }}.zip

      - name: Upload Final Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: tinydis-${{ matrix.target }}.*

  publish:
    needs: [build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version || github.ref_name }}
          name: Release ${{ github.event.inputs.release_version || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true # 自动生成更新日志
          files: |
            tinydis-*.tar.gz
            tinydis-*.zip


